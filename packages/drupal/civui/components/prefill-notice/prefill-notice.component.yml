$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Prefill Notice
status: stable
group: CivUI Form Patterns
description: 'Notice banner indicating form data has been pre-filled from a profile.'

props:
  type: object
  properties:
    profile_href:
      title: Profile href
      type: string
      description: 'URL to the user profile'
    link_text:
      title: Link text
      type: string
      description: 'Text for the profile link'

libraryOverrides:
  dependencies:
    - civui/civui

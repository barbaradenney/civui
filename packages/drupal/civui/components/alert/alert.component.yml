$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Alert
status: stable
group: CivUI Layout
description: 'Alert banner for informational, warning, error, or success messages.'

props:
  type: object
  properties:
    intent:
      title: Variant
      type: string
      enum: ['info', 'success', 'warning', 'error', 'neutral']
      description: 'Alert type'
    heading:
      title: Heading
      type: string
      description: 'Alert heading text'
    label:
      title: Label
      type: string
      description: 'Accessible label for the alert'
    dismissible:
      title: Dismissible
      type: boolean
      default: false
      description: 'Show a dismiss button'
    slim:
      title: Slim
      type: boolean
      default: false
      description: 'Compact intent without heading'
    heading_level:
      title: Heading level
      type: integer
      enum: [2, 3, 4, 5, 6]
      default: 4
      description: 'HTML heading level for the alert heading'
    emphasis:
      title: Emphasis
      type: string
      enum: ['primary', 'secondary', 'tertiary']
      default: 'secondary'
      description: 'Visual treatment. `primary` = filled with stronger emphasis; `secondary` = subtle background (default); `tertiary` = transparent with a colored leading border'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Vertical padding. `default` for standalone alerts; `sm` for nested/dense contexts'
    collapsible:
      title: Collapsible
      type: boolean
      default: false
      description: 'Wrap heading + body in a native `<details>`/`<summary>` so the body collapses behind a clickable chevron. Requires `heading`.'
    open:
      title: Open
      type: boolean
      default: false
      description: 'When `collapsible`, controls and reflects the expanded state.'
    full_width:
      title: Full width
      type: boolean
      default: false
      description: 'Render as a persistent site-wide banner with `role="region"` landmark semantics and content centered to the site max-width.'


slots:
  default:
    title: Default
    description: 'Alert body content'

libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Textarea
status: stable
group: CivUI Inputs
description: 'Multi-line text input.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Visible label rendered above the control'
    hint:
      title: Hint
      type: string
      description: 'Hint text rendered below the label'
    error:
      title: Error
      type: string
      description: 'Error message text. When present, switches the control to error styling and is announced via role="alert"'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Current value'
    rows:
      title: Rows
      type: integer
      default: 4
      description: 'Number of visible text rows'
    maxlength:
      title: Max length
      type: integer
      description: 'Maximum character count'
    placeholder:
      title: Placeholder
      type: string
      description: 'Placeholder text'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    readonly:
      title: Read only
      type: boolean
      default: false
    minlength:
      title: Minlength
      type: integer
      description: 'Minimum character length'
    maxwords:
      title: Maxwords
      type: integer
      description: 'Maximum word count. Switches the counter from characters to words and surfaces a "{n} words remaining" hint'
    autogrow:
      title: Autogrow
      type: boolean
      default: false
      description: 'Auto-expand the textarea height to fit the content as the user types'
    max_height:
      title: Max height
      type: string
      description: 'Cap on autogrow height (any CSS length, e.g. "20rem"). Empty string = unlimited'
    validate:
      title: Validate
      type: string
      enum: ['length']
      description: 'Declarative validation preset. length checks min/max boundaries on blur'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Density variant. `default` renders the full label / hint / error / char-count chrome. `sm` (compact) renders just the bare `<textarea>` with the host''s `aria-label` propagated. For dense surfaces like data-grid cell editors'

libraryOverrides:
  dependencies:
    - civui/civui

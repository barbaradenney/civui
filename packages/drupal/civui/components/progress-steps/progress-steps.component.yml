$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Progress Steps
status: stable
group: CivUI Form Patterns
description: 'Segmented step indicator for multi-step form progress.'

props:
  type: object
  properties:
    steps:
      title: Steps
      type: string
      description: 'JSON array of step labels'
    current:
      title: Current
      type: integer
      description: 'Current step index (zero-based)'
    clickable:
      title: Clickable
      type: boolean
      default: false
      description: 'Allow clicking on completed steps to navigate'
    error_steps:
      title: Error steps
      type: string
      description: 'JSON array of step indices with validation errors'

libraryOverrides:
  dependencies:
    - civui/civui

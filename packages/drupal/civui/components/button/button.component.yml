$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Button
status: stable
group: CivUI Actions
description: 'Action button with variant styles.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Button text (alternative to default slot)'
    variant:
      title: Variant
      type: string
      enum: ['primary', 'secondary', 'tertiary']
      description: 'Visual style variant'
    danger:
      title: Danger
      type: boolean
      default: false
      description: 'Destructive action styling'
    type:
      title: Type
      type: string
      enum: ['button', 'submit', 'reset']
      default: 'button'
      description: 'HTML button type'
    disabled:
      title: Disabled
      type: boolean
      default: false
    icon_start:
      title: Icon start
      type: string
      description: 'Leading icon name'
    icon_end:
      title: Icon end
      type: string
      description: 'Trailing icon name'
    href:
      title: Href
      type: string
      description: 'When set, renders as `<a href>` instead of `<button>` — for navigation affordances that visually belong with other buttons (e.g. an "Add another" link styled as a secondary button). The label is underlined so the link identity stays visible'
    icon_only:
      title: Icon only
      type: boolean
      default: false
      description: 'Render the `label` visually hidden so only the icon is visible; the label still provides the accessible name. Use for square icon buttons such as kebab triggers, close buttons, or compact toolbar actions. Requires at least one of `iconSt...'

slots:
  default:
    title: Default
    description: 'Child content (alternative to label prop)'

libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Page Header
status: stable
group: CivUI Layout
description: 'Page header with tag, eyebrow, heading, and subheading slots.'

props:
  type: object
  properties:
    spacing:
      title: Spacing
      type: string
      description: 'Bottom spacing variant'
    icon_start:
      title: Icon start
      type: string
      description: 'Leading icon name (e.g. category icon)'
    icon_end:
      title: Icon end
      type: string
      description: 'Trailing icon name'
    rhythm:
      title: Rhythm
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Bottom margin to the content below the header. `default` = 24px; `sm` = 12px. Named `rhythm` (not `spacing`) because the value controls margin between the header and the next sibling, not internal padding. Per density-convention.md "Thre...'

slots:
  tag:
    title: Tag
    description: 'Tag element above the eyebrow'
  eyebrow:
    title: Eyebrow
    description: 'Eyebrow text above the heading'
  heading:
    title: Heading
    description: 'Main heading content'
  subheading:
    title: Subheading
    description: 'Subheading below the main heading'

libraryOverrides:
  dependencies:
    - civui/civui

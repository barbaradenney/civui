$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Filter Chip
status: stable
group: CivUI Controls
description: 'Selectable filter chip with optional remove button.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Chip label text'
    value:
      title: Value
      type: string
      description: 'Chip value'
    selected:
      title: Selected
      type: boolean
      default: false
      description: 'Whether the chip is selected'
    removable:
      title: Removable
      type: boolean
      default: false
      description: 'Show a remove button'
    disabled:
      title: Disabled
      type: boolean
      default: false
    chip_style:
      title: Chip style
      type: string
      enum: ['primary', 'secondary']
      default: 'secondary'
      description: 'Visual treatment. `primary` = solid filled when selected; `secondary` = subtle background'
    chip_role:
      title: Chip role
      type: string
      enum: ['toggle', 'radio']
      default: 'toggle'
      description: 'Interaction model. `toggle` (default) = standalone on/off; `radio` = single member of a single-select group (use civ-filter-chip-group to enforce mutual exclusivity)'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Padding density. `default` for standalone; `sm` for dense filter strips'
    icon_start:
      title: Icon start
      type: string
      description: 'Leading icon name (e.g. category emoji-replacement)'
    icon_end:
      title: Icon end
      type: string
      description: 'Trailing icon name (note: `removable` overrides this with a × icon)'
    count:
      title: Count
      type: integer
      description: 'Optional count badge appended after the label (e.g. `Open jobs (12)`). `null` hides the badge'


libraryOverrides:
  dependencies:
    - civui/civui

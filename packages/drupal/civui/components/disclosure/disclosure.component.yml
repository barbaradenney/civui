$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Disclosure
status: stable
group: CivUI Layout
description: 'Inline expandable content widget for "Why we ask?" and supplementary text.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Trigger text'
    open:
      title: Open
      type: boolean
      default: false
      description: 'Whether the disclosure is expanded'
    icon:
      title: Icon
      type: string
      description: 'Icon name from civ-icon library'
    size:
      title: Size
      type: string
      description: 'Trigger size variant'

slots:
  content:
    title: Content
    description: 'The disclosed content shown when open'

libraryOverrides:
  dependencies:
    - civui/civui

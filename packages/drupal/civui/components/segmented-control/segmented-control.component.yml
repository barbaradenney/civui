$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Segmented Control
status: stable
group: CivUI Controls
description: 'Segmented button group for single-select. Self-contained — pass `legend`, `hint`, and `error` directly.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Group legend text'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Currently selected value'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false

slots:
  default:
    title: Default
    description: 'Segment option elements'

libraryOverrides:
  dependencies:
    - civui/civui

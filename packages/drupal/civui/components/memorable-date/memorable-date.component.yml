$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Memorable Date
status: stable
group: CivUI Inputs
description: 'Three-field date input for known dates like birthdays. Self-contained — pass `legend`, `hint`, and `error` directly.'

props:
  type: object
  properties:
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Date value in ISO format'
    label:
      title: Label
      type: string
      description: 'Accessible label'
    locale:
      title: Locale
      type: string
      description: 'Locale for month names'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    month_label:
      title: Month label
      type: string
      default: 'Month'
      description: 'Label for the month select'
    day_label:
      title: Day label
      type: string
      default: 'Day'
      description: 'Label for the day input'
    year_label:
      title: Year label
      type: string
      default: 'Year'
      description: 'Label for the year input'
    month_empty_label:
      title: Month empty label
      type: string
      default: '- Month -'
      description: 'Empty option text for month select'
    day_placeholder:
      title: Day placeholder
      type: string
      default: 'DD'
      description: 'Placeholder for day input'
    year_placeholder:
      title: Year placeholder
      type: string
      default: 'YYYY'
      description: 'Placeholder for year input'
    date_set_message:
      title: Date set message
      type: string
      default: 'Date set to {date}'
      description: 'Screen reader announcement when date is set ({date} interpolated)'
    invalid_date_message:
      title: Invalid date message
      type: string
      default: 'Enter a valid date'
      description: 'Error message for invalid date combinations'
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend rendered above the date sub-fields. The component is self-contained — do not wrap in civ-fieldset.'



libraryOverrides:
  dependencies:
    - civui/civui

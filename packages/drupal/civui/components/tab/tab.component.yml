$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Tab
status: stable
group: CivUI Navigation
description: 'See @civui/schema civ-tab for the canonical contract.'

props:
  type: object
  properties:
    selected:
      title: Selected
      type: boolean
      default: false
      description: 'Set by the parent `<civ-tabs>` to reflect the current selection. Don''t set this directly. Set `value` on `<civ-tabs>` instead. Reflected so CSS can style `[selected]`'

libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Link Card
status: stable
group: CivUI Actions
description: 'Clickable card that navigates to a URL.'

props:
  type: object
  properties:
    href:
      title: Href
      type: string
      description: 'Link URL'
    heading:
      title: Heading
      type: string
      description: 'Card heading text'
    description:
      title: Description
      type: string
      description: 'Card description text'
    variant:
      title: Variant
      type: string
      description: 'Visual style variant'
    spacing:
      title: Spacing
      type: string
      description: 'Internal spacing variant'
    color:
      title: Color
      type: string
      description: 'Card color variant'
    disabled:
      title: Disabled
      type: boolean
      default: false
    icon_start:
      title: Icon start
      type: string
      description: 'Leading icon name'
    icon_end:
      title: Icon end
      type: string
      description: 'Trailing icon name (defaults to chevron / arrow on most variants)'
    eyebrow:
      title: Eyebrow
      type: string
      description: 'Small text rendered above the heading (e.g. category label, status)'


libraryOverrides:
  dependencies:
    - civui/civui

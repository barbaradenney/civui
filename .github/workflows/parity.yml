name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run consistency check
        run: node --experimental-strip-types tools/consistency-check.ts
      - name: Check component registration
        run: node --experimental-strip-types tools/registration-check.ts
      - name: Validate Drupal SDCs
        run: node --experimental-strip-types tools/validate-drupal-sdc.ts

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate parity report
        run: node --experimental-strip-types tools/parity-report.ts
      - name: Enforce parity threshold (85%)
        run: |
          node --experimental-strip-types -e "
            import { readFileSync } from 'fs';
            const html = readFileSync('tools/parity-report.html', 'utf-8');
            const matches = [...html.matchAll(/class=\"component-header\"[^>]*>\s*(\w+)[\s\S]*?(\d+)%/g)];
            let below = 0;
            for (const m of matches) {
              const pct = parseInt(m[2]);
              if (pct < 85) {
                console.warn('FAIL: ' + m[1] + ' at ' + pct + '% (minimum 85%)');
                below++;
              }
            }
            if (below > 0) {
              console.warn('\n' + below + ' component(s) below 85% parity threshold.');
              console.warn('See the uploaded parity-report artifact for details.');
            } else {
              console.log('All components at 85%+ parity');
            }
            if (below > 0) process.exit(1);
          "
      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: tools/parity-report.html

  schema-parity:
    name: Schema parity (Lit ↔ schema ↔ iOS ↔ Android ↔ Drupal)
    runs-on: ubuntu-latest
    # `--platforms` runs the Lit↔schema check first (always) and adds
    # cross-platform validation on top — one job covers both.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate every platform implements every schema prop
        run: pnpm parity:schema --platforms

  schema-validate:
    name: Schema structural validation (validateAll)
    runs-on: ubuntu-latest
    # Catches structural typos that TypeScript misses: invalid category /
    # extends / valueMode / requiredIndicator values, enum defaults outside
    # the values array, malformed renderOrder. Errors fail the build;
    # binding-reference warnings are informational.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run validateAll over every schema
        run: pnpm validate:schemas

  drift-lints:
    name: Drift lints (14 static checks across repo)
    runs-on: ubuntu-latest
    # Fast static lints that catch drift across the whole repo, not
    # just form patterns. None of these read files at runtime — they
    # parse source and exit in seconds. Wired together as
    # `pnpm validate:lints` for local use.
    #
    #   lint:fieldsets       - No self-contained group component is
    #                          wrapped in civ-fieldset (would
    #                          produce nested fieldsets with double
    #                          legends + broken slot relocation).
    #   lint:story-embeds    - Every <StoryEmbed id="..."/> in
    #                          apps/docs resolves to a real story
    #                          export. Catches renames, slug typos,
    #                          and refs to deleted components.
    #   lint:story-names     - StoryObj export name and `name:`
    #                          display title share at least one
    #                          substantive token. Catches the
    #                          WithError → "Custom Button Labels"
    #                          drift that misled the audit.
    #   lint:story-props     - Every <civ-*> attribute used in any
    #                          *.stories.ts corresponds to a declared
    #                          @property on the underlying component
    #                          (or one of its known base classes).
    #                          Catches phantom attrs like add-label,
    #                          preset="document-type", invented
    #                          variants on civ-action-link, etc.
    #   lint:prose-refs      - Every <civ-X> tag reference in long-
    #                          form docs (CLAUDE.md, AGENTS.md,
    #                          .claude/rules/, apps/docs/docs/**/
    #                          *.mdx) resolves to a registered custom
    #                          element. Catches narrative-only drift
    #                          — e.g. the civ-form-field bullet that
    #                          outlived the component, or
    #                          civ-progress-bar refs across 7 files.
    #   lint:color-classes   - Every civ-{text|bg|border|ring|fill|
    #                          stroke|divide|outline}-{family}-{shade}
    #                          class anywhere in the repo resolves to
    #                          a real `--civ-color-*` token. Catches
    #                          typos like civ-text-success-darker (no
    #                          such shade on success) before they
    #                          ship as silently-unstyled text.
    #   lint:jsdoc-props     - Every `@prop` tag in a component's
    #                          class-level JSDoc names a declared
    #                          `@property` on that class (or an
    #                          inherited prop from the base class).
    #                          Catches docstring drift like the
    #                          civ-action-sheet `trapFocus` doc that
    #                          actually mapped to `trapFocusProp`.
    #   lint:jsdoc-events    - Companion to lint:jsdoc-props for
    #                          events. Every @fires tag must match
    #                          a real dispatch(this, 'civ-X') or
    #                          new CustomEvent('civ-X') in the same
    #                          class.
    #   lint:safelist-stale  - Every entry in tailwind.config.ts
    #                          safelist must protect a real Tailwind
    #                          utility — not a plain CSS rule from
    #                          components.css (where safelist has
    #                          no effect).
    #   lint:hardcoded-tokens- No literal motion durations, z-index
    #                          values (beyond the single-layer-stack
    #                          idiom), or arbitrary Tailwind values
    #                          in component source/CSS. Use the
    #                          var(--civ-*) tokens instead.
    #   lint:coverage-trinity- Every @customElement has a co-located
    #                          *.test.ts, *.stories.ts, and (for
    #                          cross-platform components) a schema.
    #                          Paired components may share the
    #                          parent's test / stories file.
    #   lint:event-listener-leak - Every addEventListener call in
    #                          connectedCallback / firstUpdated has
    #                          a matching removeEventListener in the
    #                          same class.
    #   lint:host-display    - Every @customElement('civ-*') has an
    #                          explicit `display` rule for its host
    #                          in core/styles/components.css or civ.css.
    #                          Catches the civ-list-item dividers class
    #                          of bug — borders/padding/background do
    #                          NOT paint on `display: inline` (the
    #                          browser default for custom elements), so
    #                          host-targeted rules silently render zero
    #                          pixels. Print-only rules don't count.
    #   lint:purged-variants - Every `.civ-X--Y` BEM modifier selector
    #                          in components.css has a literal-string
    #                          reference in some TS file. Catches the
    #                          civ-action-btn--*-danger class of bug —
    #                          Tailwind's content scanner purges plain
    #                          CSS rules in @layer components when the
    #                          selector isn't seen as a static string
    #                          anywhere in scanned content. Template-
    #                          literal class construction is invisible
    #                          to the scanner.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run drift lints
        run: pnpm validate:lints

  doc-tables-sync:
    name: Doc tables in sync with schema
    runs-on: ubuntu-latest
    # Regenerates the auto-generated _<component>.props.mdx and
    # _<component>.events.mdx partials from @civui/schema and fails if
    # the working tree changed — catches hand-edits to a generated
    # partial. Split from drift-lints because it has a different
    # remediation step: run `pnpm sync:doc-tables` and commit the
    # diff. Cheap enough to run on every PR.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Regenerate doc tables and verify clean tree
        run: pnpm validate:doc-tables
      - name: Show drift diff on failure
        if: failure()
        run: |
          echo "::error::Doc-table partials drift from @civui/schema. Run:"
          echo "  pnpm sync:doc-tables"
          echo "  git add apps/docs/docs/components/**/_*.mdx"
          echo "  git commit -m \"docs: sync doc tables\""
          echo ""
          git diff -- 'apps/docs/docs/components/**/_*.props.mdx' 'apps/docs/docs/components/**/_*.events.mdx' || true

  tool-tests:
    name: Tooling unit tests (parity / sync helpers)
    runs-on: ubuntu-latest
    # Catches regressions in the prop-name normalization, snake↔camel
    # conversions, and Twig rendering helpers that all the parity / sync
    # CI gates rely on. Without this, a broken parser could silently
    # report drift as in-sync.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tool unit tests
        run: pnpm test:tools

  docs-build:
    name: Docusaurus build (catches contract-page generation drift)
    runs-on: ubuntu-latest
    # Catches schema changes that break the contract generator OR produce
    # invalid MDX in any docs page before they reach main. The pages.yml
    # workflow runs the full build on push to main, but this PR-time gate
    # surfaces the same failure before merge instead of after.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Docusaurus (regenerates contract pages via prebuild hook)
        run: cd apps/docs && pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  storybook-build:
    name: Storybook build smoke (catches story render-time errors)
    runs-on: ubuntu-latest
    # The story-embed / story-name / story-props lints catch *static*
    # drift (dead refs, mismatched names, phantom attributes). They do
    # NOT catch render-time errors: a story whose render() throws, an
    # import that fails to resolve, an MDX docs page with a syntax
    # error, or a contract-page generator that emits invalid markup.
    #
    # `storybook build` parses every *.stories.ts and every MDX file
    # under .storybook/contract/, runs Vite + Rollup, and produces a
    # static bundle. If any story file fails to compile or any
    # entry-point throws at module load, the build fails — exactly
    # the regression mode we want to catch before merge.
    #
    # Note: this is a *static* build (no headless story execution).
    # If render-time bugs that only surface at runtime become a
    # recurring issue, install @storybook/test-runner and run it
    # against the built bundle here.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook (prestorybook hook regenerates contract MDX)
        run: pnpm storybook:build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  drupal-sync-clean:
    name: Drupal SDC + Twig in sync with schema
    runs-on: ubuntu-latest
    # Catches hand-edits to *.component.yml or *.twig that diverge from
    # what `pnpm sync:drupal` would emit — e.g. a boolean prop rendered
    # as a string in Twig, a missing slot block, or a stale prop after
    # a schema rename. Schema-parity catches missing props; this catches
    # rendering drift.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Regenerate from schema
        run: pnpm sync:drupal
      - name: Verify the regenerated output matches what's committed
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "::error::Drupal SDC YAML or Twig templates drift from schema."
            echo "::error::Run \`pnpm sync:drupal\` locally and commit the result."
            exit 1
          fi

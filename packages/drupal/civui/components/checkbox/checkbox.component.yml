$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Checkbox
status: stable
group: CivUI Controls
description: 'Single checkbox with inline label. Self-contained — does not need form-field wrapper.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Checkbox label text'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Value submitted when checked'
    checked:
      title: Checked
      type: boolean
      default: false
      description: 'Whether the checkbox is checked'
    description:
      title: Description
      type: string
      description: 'Additional description text'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    indeterminate:
      title: Indeterminate
      type: boolean
      default: false
      description: 'Tri-state mixed/indeterminate state'
    tile:
      title: Tile
      type: boolean
      default: true
      description: 'Tile variant with bordered card styling. Default is true — tiles are the standard treatment; opt out for blank inline checkboxes'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Density variant. `default` renders the full tap-target with label, hint, description, and required-mark chrome. `sm` renders a compact 20px input with no chrome — for use inside data-grid rows, column-toggle panels, and other dense surfa...'

libraryOverrides:
  dependencies:
    - civui/civui

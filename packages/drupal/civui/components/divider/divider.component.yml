$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Divider
status: stable
group: CivUI Layout
description: 'Horizontal divider line with spacing options.'

props:
  type: object
  properties:
    spacing:
      title: Spacing
      type: string
      description: 'Vertical spacing emphasis'
    emphasis:
      title: Variant
      type: string
      description: 'Visual style emphasis'
    rhythm:
      title: Rhythm
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Vertical margin (top + bottom) around the divider line. `default` = 16px; `sm` = 8px. Named `rhythm` (not `spacing`) because the value controls margin between the divider and its siblings, not internal padding. Per density-convention.md ...'

libraryOverrides:
  dependencies:
    - civui/civui

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build all packages (tokens → core → forms)
      - run: pnpm build

      # Build Docusaurus docs
      - run: cd apps/docs && pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # Build Storybook
      - run: pnpm storybook:build -o storybook-static
        env:
          STORYBOOK_BASE: /civui/storybook/

      # Build VA Forms demo
      - run: cd apps/civ-site && pnpm build
        env:
          VITE_BASE: /civui/forms/

      # Assemble site: Docusaurus + /storybook/ + /forms/
      - run: |
          mv apps/docs/build _site
          mv storybook-static _site/storybook
          mv apps/civ-site/dist _site/forms

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

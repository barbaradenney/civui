$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Read More
status: stable
group: CivUI Layout
description: 'Two-stage content disclosure: always-visible teaser plus a Read more button that reveals additional content.'

props:
  type: object
  properties:
    open:
      title: Expanded
      type: boolean
      default: false
      description: 'Whether the rest region is currently visible'
    more_label:
      title: More label
      type: string
      description: 'Override the "Read more" trigger text'
    less_label:
      title: Less label
      type: string
      description: 'Override the "Read less" trigger text'
    icon:
      title: Icon
      type: string
      description: 'Optional icon name shown before the label'
    size:
      title: Size
      type: string
      description: 'Trigger size variant'
    inline:
      title: Inline
      type: boolean
      default: false
      description: 'Render inline so the trigger flows as the last words of the teaser'
    no_fade_trigger:
      title: No fade trigger
      type: boolean
      default: false
      description: 'Opt out of the default block-mode fade-and-overlay treatment. By default (collapsed, block mode), the teaser fades into `--civ-read-more-bg` at the bottom and the trigger sits centered over the fade so the affordance reads as part of the...'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Trigger padding density. Matches the design-system `spacing` convention shared by `civ-alert`, `civ-card`, `civ-list-item`, and the data-grid input controls.'

slots:
  teaser:
    title: Teaser
    description: 'Always-visible content shown above the toggle'
  rest:
    title: Rest
    description: 'Content revealed when the user expands. Wrap the content in `<div data-rest>...</div>` so the web component routes it into the hidden rest region (otherwise it merges with the teaser).'

libraryOverrides:
  dependencies:
    - civui/civui

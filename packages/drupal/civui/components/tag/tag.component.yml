$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Tag
status: stable
group: CivUI Layout
description: 'Small label tag for categorization and status indicators.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Tag text'
    color:
      title: Variant
      type: string
      description: 'Color color'
    tag_style:
      title: Tag style
      type: string
      description: 'Visual style of the tag'
    spacing:
      title: Spacing
      type: string
      description: 'Spacing color'
    icon_start:
      title: Icon start
      type: string
      description: 'Leading icon name'


libraryOverrides:
  dependencies:
    - civui/civui

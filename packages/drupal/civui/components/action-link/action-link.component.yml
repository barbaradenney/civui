$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Action Link
status: stable
group: CivUI Actions
description: 'Contextual action link for phone, email, download, and external links.'

props:
  type: object
  properties:
    type:
      title: Type
      type: string
      enum: ['phone', 'email', 'download', 'external']
      description: 'Link type'
    number:
      title: Number
      type: string
      description: 'Phone number (for phone type)'
    address:
      title: Address
      type: string
      description: 'Email address (for email type)'
    subject:
      title: Subject
      type: string
      description: 'Email subject (for email type)'
    href:
      title: Href
      type: string
      description: 'Link URL'
    filename:
      title: Filename
      type: string
      description: 'Download filename'
    file_size:
      title: File size
      type: string
      description: 'Download file size text'
    label:
      title: Label
      type: string
      description: 'Link label text'
    disabled:
      title: Disabled
      type: boolean
      default: false

libraryOverrides:
  dependencies:
    - civui/civui

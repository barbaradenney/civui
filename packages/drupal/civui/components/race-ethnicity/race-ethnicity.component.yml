$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Race Ethnicity
status: stable
group: CivUI Compound
description: 'Compound race and ethnicity selection field per federal standards.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name prefix'
    ethnicity_legend:
      title: Ethnicity legend
      type: string
      description: 'Legend for the ethnicity group'
    race_legend:
      title: Race legend
      type: string
      description: 'Legend for the race group'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    ethnicity_error:
      title: Ethnicity error
      type: string
      description: 'Per-field error for the ethnicity radio group'
    race_error:
      title: Race error
      type: string
      description: 'Per-field error for the race checkbox group'
    layout:
      title: Variant
      type: string
      enum: ['auto', 'card', 'list']
      default: 'auto'
      description: 'Tile rendering layout forwarded to both inner groups. auto picks card for ≤4 options and list for 5+ — Race (6 options) renders as list, Ethnicity (3 options) stays card'


libraryOverrides:
  dependencies:
    - civui/civui

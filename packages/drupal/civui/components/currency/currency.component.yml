$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Currency
status: stable
group: CivUI Inputs
description: 'Currency input with formatting.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Visible label rendered above the control'
    hint:
      title: Hint
      type: string
      description: 'Hint text rendered below the label'
    error:
      title: Error
      type: string
      description: 'Error message text. When present, switches the control to error styling and is announced via role="alert"'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Current value'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    decimals:
      title: Decimals
      type: integer
      default: 2
      description: 'Number of decimal places displayed (default 2 for cents)'
    min:
      title: Min
      type: number
      description: 'Inclusive minimum value'
    max:
      title: Max
      type: number
      description: 'Inclusive maximum value'
    allow_negative:
      title: Allow negative
      type: boolean
      default: false
      description: 'Allow negative values (refunds / adjustments)'

libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Action Button
status: stable
group: CivUI Actions
description: 'Stateful action button with toggle and danger support.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Button label text'
    variant:
      title: Variant
      type: string
      enum: ['primary', 'secondary', 'tertiary']
      description: 'Visual style variant'
    danger:
      title: Danger
      type: boolean
      default: false
      description: 'Destructive action styling'
    disabled:
      title: Disabled
      type: boolean
      default: false
    pressed:
      title: Pressed
      type: boolean
      default: false
      description: 'Toggle pressed state'
    type:
      title: Type
      type: string
      enum: ['button', 'submit', 'reset']
      default: 'button'
      description: 'HTML button type'
    icon_start:
      title: Icon start
      type: string
      description: 'Leading icon name'
    icon_end:
      title: Icon end
      type: string
      description: 'Trailing icon name'
    href:
      title: Href
      type: string
      description: 'When set, renders as `<a href>` instead of `<button>` — for navigation affordances that visually belong with other action buttons (e.g. an Edit link next to a Remove button in a list row). The label gets underlined so the link identity s...'

libraryOverrides:
  dependencies:
    - civui/civui

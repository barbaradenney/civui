$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Signature
status: stable
group: CivUI Compound
description: 'Digital signature field with certification statement.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name'
    statement:
      title: Statement
      type: string
      description: 'Certification statement text'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    name_error:
      title: Name error
      type: string
      description: 'Per-field error for the typed-name input'
    certify_error:
      title: Certify error
      type: string
      description: 'Per-field error for the certify checkbox'
    card:
      title: Card
      type: boolean
      default: false
      description: 'Render the signature block as an outlined card instead of a bare fieldset. Highlights the legal weight of the action'


libraryOverrides:
  dependencies:
    - civui/civui

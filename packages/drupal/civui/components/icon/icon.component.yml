$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Icon
status: stable
group: CivUI Core
description: 'Pure CSS icon that scales with font-size and inherits color.'

props:
  type: object
  properties:
    name:
      title: Name
      type: string
      description: 'Icon name from the icon library'
    label:
      title: Label
      type: string
      description: 'Accessible label for the icon'
    size:
      title: Size
      type: string
      description: 'Size shorthand — `sm` / `md` / `lg` / `xl` / `2xl` map to font-size multipliers; explicit values like `24px` or `1.5em` are passed through. Empty inherits parent font-size'
    rotate:
      title: Rotate
      type: integer
      description: 'Rotation in degrees. Common values: 90, 180, 270'
    flip:
      title: Flip
      type: string
      enum: ['horizontal', 'vertical', 'both']
      description: 'Mirror axis. `horizontal` flips left-right; `vertical` flips top-bottom; `both` flips both'


libraryOverrides:
  dependencies:
    - civui/civui

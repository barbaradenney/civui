$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Date Picker
status: stable
group: CivUI Inputs
description: 'Calendar date picker for scheduling dates.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Visible label rendered above the control'
    hint:
      title: Hint
      type: string
      description: 'Hint text rendered below the label'
    error:
      title: Error
      type: string
      description: 'Error message text. When present, switches the control to error styling and is announced via role="alert"'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Current date value (ISO format)'
    min:
      title: Min date
      type: string
      description: 'Earliest selectable date (ISO format)'
    max:
      title: Max date
      type: string
      description: 'Latest selectable date (ISO format)'
    placeholder:
      title: Placeholder
      type: string
      description: 'Placeholder text'
    locale:
      title: Locale
      type: string
      description: 'Locale for date formatting'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    week_starts_on:
      title: Week starts on
      type: integer
      default: 0
      description: 'Day the week starts on (0=Sunday, 1=Monday)'
    choose_date_label:
      title: Choose date label
      type: string
      default: 'Choose date'
      description: 'Aria label for the calendar toggle button'
    selected_date_label:
      title: Selected date label
      type: string
      default: 'Choose date, selected date is {date}'
      description: 'Aria label template when a date is selected ({date} interpolated)'
    dialog_label:
      title: Dialog label
      type: string
      default: 'Choose Date'
      description: 'Aria label for the calendar dialog'
    previous_month_label:
      title: Previous month label
      type: string
      default: 'Previous month'
      description: 'Aria label for previous month button'
    next_month_label:
      title: Next month label
      type: string
      default: 'Next month'
      description: 'Aria label for next month button'
    dialog_opened_message:
      title: Dialog opened message
      type: string
      default: 'Calendar dialog opened'
      description: 'Screen reader announcement when calendar opens'
    date_selected_message:
      title: Date selected message
      type: string
      default: 'Selected {date}'
      description: 'Screen reader announcement when date is selected ({date} interpolated)'
    today_label:
      title: Today label
      type: string
      default: 'today'
      description: 'Text appended to today''s date for screen readers'
    disabled_dates:
      title: Disabled dates
      type: string
      description: 'Comma-separated list of YYYY-MM-DD dates to mark unselectable (e.g. holidays)'
    clear_label:
      title: Clear label
      type: string
      description: 'Aria label for the clear (×) button when a value is set'
    today_button_label:
      title: Today button label
      type: string
      description: 'Visible label on the "today" shortcut button inside the calendar dialog'
    hide_today_button:
      title: Hide today button
      type: boolean
      default: false
      description: 'Suppress the "today" shortcut button. Useful for date-of-birth and other historical-only fields'
    invalid_format_message:
      title: Invalid format message
      type: string
      description: 'Validation error shown when typed text doesn''t parse as MM/DD/YYYY'
    date_range_message:
      title: Date range message
      type: string
      description: 'Validation error shown when selected date is outside min/max'
    min_date_message:
      title: Min date message
      type: string
      description: 'Validation error shown when selected date is before min ({min} interpolated)'
    max_date_message:
      title: Max date message
      type: string
      description: 'Validation error shown when selected date is after max ({max} interpolated)'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Density variant. `default` renders the full label / hint / error chrome. `sm` (compact) renders just the input + trigger button with the host''s `aria-label` propagated. For dense surfaces like data-grid cell editors'
    inline_today:
      title: Inline today
      type: boolean
      default: false
      description: 'Render an inline "Today" shortcut inset in the input chrome (lets users jump to today without opening the picker dialog). Disabled when today is out of min/max range, when host is disabled/readonly, or when value already matches today'
    inline_today_label:
      title: Inline today label
      type: string
      description: 'Override the inline "Today" button label. Defaults to the locale-aware "Today"'
    show_today_shortcut:
      title: Show today shortcut
      type: boolean
      default: false
      description: 'Render a "Today" shortcut chip in a helper row directly below the input (lets users jump to today without opening the picker dialog). Disabled when today is out of min/max range, when host is disabled/readonly, or when value already matc...'
    today_shortcut_label:
      title: Today shortcut label
      type: string
      description: 'Override the "Today" shortcut chip label. Defaults to the locale-aware "Today"'

libraryOverrides:
  dependencies:
    - civui/civui

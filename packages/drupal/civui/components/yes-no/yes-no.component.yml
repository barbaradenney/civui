$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Yes No
status: stable
group: CivUI Inputs
description: 'Yes/No toggle input for binary questions.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Question text'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Current value (yes or no)'
    yes_label:
      title: Yes label
      type: string
      description: 'Custom label for the yes option'
    no_label:
      title: No label
      type: string
      description: 'Custom label for the no option'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    unsure_label:
      title: Unsure label
      type: string
      description: 'Visible label for the optional third button. When empty, only Yes/No are rendered'
    unsure_value:
      title: Unsure value
      type: string
      default: 'unsure'
      description: 'Form value submitted when the third button is selected'
    skip_label:
      title: Skip label
      type: string
      description: 'When non-empty, renders a "Prefer not to answer" affordance below the buttons. Outside the roving tabindex'
    skip_value:
      title: Skip value
      type: string
      default: 'skip'
      description: 'Form value submitted when the skip affordance is selected'


libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Direct Deposit
status: stable
group: CivUI Compound
description: 'Compound direct deposit field with routing number, account number, and account type.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name prefix'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    routing_error:
      title: Routing error
      type: string
      description: 'Per-field error for the routing-number input'
    account_error:
      title: Account error
      type: string
      description: 'Per-field error for the account-number input'
    type_error:
      title: Type error
      type: string
      description: 'Per-field error for the account-type radio group'


libraryOverrides:
  dependencies:
    - civui/civui

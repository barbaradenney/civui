$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Radio Group
status: stable
group: CivUI Controls
description: 'Group of radio buttons for single-select. Self-contained — pass `legend`, `hint`, and `error` directly.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Group legend text'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Currently selected value'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    preset:
      title: Preset
      type: string
      description: 'Preset option set name'
    preset_variant:
      title: Preset variant
      type: string
      description: 'Variant of the preset options'
    tile:
      title: Tile
      type: boolean
      default: true
      description: 'Tile variant with bordered card styling for child radios. Default true — tiles are the standard treatment'
    orientation:
      title: Orientation
      type: string
      enum: ['vertical', 'horizontal']
      default: 'vertical'
      description: 'Layout orientation for child radio buttons'
    variant:
      title: Variant
      type: string
      enum: ['auto', 'card', 'list']
      default: 'auto'
      description: 'Tile rendering variant. auto picks card for ≤4 options and list for 5+. Vertical + tile only'
    skip_label:
      title: Skip label
      type: string
      description: 'When non-empty, renders a "Prefer not to answer" affordance below the radio group. Outside the roving tabindex'
    skip_value:
      title: Skip value
      type: string
      default: 'skip'
      description: 'Form value used when the skip affordance is selected'


slots:
  default:
    title: Default
    description: 'Radio elements'

libraryOverrides:
  dependencies:
    - civui/civui

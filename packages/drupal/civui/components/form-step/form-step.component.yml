$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Form Step
status: stable
group: CivUI Form Patterns
description: 'Single step in a multi-step form flow.'

props:
  type: object
  properties:
    persist:
      title: Persist
      type: string
      description: 'Storage key for persisting this step''s draft state. Empty = no persistence'
    sensitive:
      title: Sensitive
      type: boolean
      default: false
      description: 'Mark step as containing sensitive data'
    show_pause:
      title: Show pause
      type: boolean
      default: false
      description: 'Show a save and pause button'
    continue_label:
      title: Continue label
      type: string
      description: 'Label for the continue button'
    complete_label:
      title: Complete label
      type: string
      description: 'Label for the final step button'
    heading_level:
      title: Heading level
      type: integer
      default: 2
      description: 'HTML heading level for the step heading'
    progress:
      title: Progress
      type: string
      enum: ['minimal', 'steps', 'bar']
      default: minimal
      description: 'Progress indicator style: minimal, steps, bar'
    header_size:
      title: Header size
      type: string
      enum: ['primary', 'secondary', 'tertiary']
      default: secondary
      description: 'Header size: primary, secondary, tertiary'
    step_title:
      title: Step title
      type: string
      description: 'Title for the current step'
    nav_disabled:
      title: Nav disabled
      type: boolean
      default: false
      description: 'Disable navigation buttons'
    hide_nav:
      title: Hide nav
      type: boolean
      default: false
      description: 'Hide all navigation UI'
    validate:
      title: Validate
      type: boolean
      default: true
      description: 'Enable required field validation before advancing'
    pause_label:
      title: Pause label
      type: string
      description: 'Override the pause action label'

slots:
  default:
    title: Default
    description: 'Step form content'

libraryOverrides:
  dependencies:
    - civui/civui

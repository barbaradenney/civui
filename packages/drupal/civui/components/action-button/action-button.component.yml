$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Action Button
status: stable
group: CivUI Actions
description: 'Stateful action button with toggle and danger support.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Button label text'
    emphasis:
      title: Variant
      type: string
      enum: ['primary', 'secondary', 'tertiary']
      description: 'Visual style emphasis'
    danger:
      title: Danger
      type: boolean
      default: false
      description: 'Destructive action styling'
    disabled:
      title: Disabled
      type: boolean
      default: false
    pressed:
      title: Pressed
      type: boolean
      default: false
      description: 'Toggle pressed state'
    type:
      title: Type
      type: string
      enum: ['button', 'submit', 'reset']
      default: 'button'
      description: 'HTML button type'
    icon_start:
      title: Icon start
      type: string
      description: 'Leading icon name'
    icon_end:
      title: Icon end
      type: string
      description: 'Trailing icon name'
    href:
      title: Href
      type: string
      description: 'When set, renders as `<a href>` instead of `<button>` — for navigation affordances that visually belong with other action buttons (e.g. an Edit link next to a Remove button in a list row). The label gets underlined so the link identity s...'
    icon_only:
      title: Icon only
      type: boolean
      default: false
      description: 'Render the `label` visually hidden so only the icon is visible; the label still provides the accessible name. Use for square icon buttons such as kebab triggers, close buttons, or compact toolbar actions. Requires at least one of `iconSt...'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Density emphasis. `sm` shrinks padding, min-height, and font-size so the button sits flush next to `civ-input--sm` in dense surfaces like data-grid cell editors or compact input-groups'
    current:
      title: Current
      type: boolean
      default: false
      description: 'Marks this button as the current item in a navigation set (e.g. active page in pagination, current step in a wizard). Renders `aria-current="page"` on the inner `<button>`. Distinct from `pressed` (toggle-button semantics)'

libraryOverrides:
  dependencies:
    - civui/civui

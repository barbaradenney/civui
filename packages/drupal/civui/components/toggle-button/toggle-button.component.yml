$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Toggle Button
status: stable
group: CivUI Actions
description: 'Text button with two persistent labels and an aria-pressed state (Show / Hide, Mute / Unmute).'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Unpressed label ("Show", "Mute", "Expand").'
    pressed_label:
      title: Pressed label
      type: string
      description: 'Pressed label ("Hide", "Unmute", "Collapse").'
    pressed:
      title: Pressed
      type: boolean
      default: false
      description: 'Reflected boolean state. Two-way bindable.'
    emphasis:
      title: Emphasis
      type: string
      enum: ['primary', 'secondary', 'tertiary']
      default: 'secondary'
      description: 'Visual emphasis. primary = filled brand pill; secondary = gray pill (default); tertiary = transparent text-link style.'
    variant:
      title: Variant
      type: string
      enum: ['', 'chip', 'inline']
      default: ''
      description: 'Deprecated alias for emphasis. variant=chip → emphasis=secondary; variant=inline → emphasis=tertiary. Will be removed in the next major release.'
    icon_start:
      title: Icon start
      type: string
      description: 'Optional leading icon name from the CivUI icon library.'

slots:
  default:
    title: Default
    description: 'Child content (alternative to label prop).'

libraryOverrides:
  dependencies:
    - civui/civui

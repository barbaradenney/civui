name: Bundle Size

on:
  pull_request:
    branches: [main]

jobs:
  check-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build only the publishable packages — not the docs app. The bundle
      # budget measures shipped package dist/, so building apps/docs here is
      # wasted work and would couple this gate to an unrelated build. The
      # docs app has its own build job in parity.yml. `turbo build` doesn't
      # run the root `postbuild` minify hook, so invoke minify explicitly —
      # the budgets below are calibrated to the *minified* output.
      - run: pnpm exec turbo build --filter='./packages/*'

      - run: node scripts/minify.js

      - name: Check bundle sizes
        run: |
          # Per-package budgets in KB for the built (minified) dist/ output.
          # Calibrated to the current size + headroom so legitimate growth
          # doesn't flap CI, while a real regression trips the gate. When a
          # bump is intentional, raise the number here in the same PR.
          declare -A BUDGET_KB=(
            [actions]=640
            [cli]=384
            [compound]=640
            [content]=384
            [core]=1152
            [data]=768
            [feedback]=512
            [form-patterns]=896
            [inputs]=1792
            [layout]=640
            [mcp-server]=5120
            [navigation]=512
            [overlays]=384
            [schema]=3840
            [storybook-utils]=128
            [test-utils]=64
            [tokens]=192
          )

          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Size | Budget | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          over_budget=0

          # Iterate every built package so coverage stays complete as packages
          # are added or removed — no hard-coded package list to drift.
          for dist in packages/*/dist; do
            pkg=$(basename "$(dirname "$dist")")

            # Skip private packages — they're not shipped to consumers.
            if grep -q '"private": true' "packages/$pkg/package.json"; then
              continue
            fi

            size_kb=$(du -sk "$dist" | cut -f1)
            human=$(du -sh "$dist" | cut -f1)
            budget=${BUDGET_KB[$pkg]:-}

            if [ -z "$budget" ]; then
              # A built, publishable package with no budget entry — fail loudly
              # so new packages get an explicit budget instead of slipping the gate.
              echo "| @civui/$pkg | $human | _(none)_ | ⚠️ unbudgeted |" >> $GITHUB_STEP_SUMMARY
              echo "::error::@civui/$pkg has no bundle budget. Add a BUDGET_KB entry in .github/workflows/bundle-size.yml."
              over_budget=1
            elif [ "$size_kb" -gt "$budget" ]; then
              echo "| @civui/$pkg | $human | ${budget}K | ❌ over |" >> $GITHUB_STEP_SUMMARY
              echo "::error::@civui/$pkg is ${size_kb}K (budget: ${budget}K)."
              over_budget=1
            else
              echo "| @civui/$pkg | $human | ${budget}K | ✅ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$over_budget" -ne 0 ]; then
            echo "One or more packages exceeded their bundle budget." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Combobox
status: stable
group: CivUI Inputs
description: 'Autocomplete combobox with filterable option list. Wrap in form-field for label/hint/error.'

props:
  type: object
  properties:
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Current value'
    placeholder:
      title: Placeholder
      type: string
      description: 'Placeholder text'
    no_results_text:
      title: No results text
      type: string
      description: 'Text shown when no options match'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false

slots:
  default:
    title: Default
    description: 'Option elements'

libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Select
status: stable
group: CivUI Inputs
description: 'Dropdown select input.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Visible label rendered above the control'
    hint:
      title: Hint
      type: string
      description: 'Hint text rendered below the label'
    error:
      title: Error
      type: string
      description: 'Error message text. When present, switches the control to error styling and is announced via role="alert"'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Currently selected value'
    preset:
      title: Preset
      type: string
      enum: ['us-state', 'service-branch', 'discharge-type', 'suffix', 'relationship-type', 'marital-status', 'ethnicity', 'gender', 'language', 'housing-status', 'education-level', 'employment-status', 'income-source', 'veteran-status', 'disability-type', 'citizenship-status', 'pay-frequency', 'contact-preference']
      description: 'Preset option list (e.g. us-states, countries)'
    preset_variant:
      title: Preset variant
      type: string
      description: 'Variant of the preset (e.g. abbreviation, full)'
    empty_label:
      title: Empty label
      type: string
      description: 'Placeholder text for the empty first option'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    options:
      title: Options
      type: array
      default: 
      description: 'Array of selectable options'
    width:
      title: Width
      type: string
      enum: ['default', '2xs', 'xs', 'sm', 'md', 'lg', 'xl', '2xl']
      default: 'default'
      description: 'Width variant'
    autocomplete:
      title: Autocomplete
      type: string
      description: 'Autocomplete hint forwarded to the underlying <select>'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Density variant. `default` renders the full label / hint / error chrome. `sm` (compact) renders just the bare `<select>` with the host''s `aria-label` propagated for screen-reader text. For dense surfaces like data-grid cell editors'

slots:
  options:
    title: Options
    description: 'Slotted <option> elements'

libraryOverrides:
  dependencies:
    - civui/civui

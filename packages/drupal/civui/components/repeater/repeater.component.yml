$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Repeater
status: stable
group: CivUI Form Patterns
description: 'Repeatable form section for adding multiple entries of the same fields.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name prefix'
    item_label:
      title: Item label
      type: string
      description: 'Label template for each item'
    mode:
      title: Mode
      type: string
      description: 'Repeater mode variant'
    min:
      title: Min
      type: integer
      description: 'Minimum number of entries'
    max:
      title: Max
      type: integer
      description: 'Maximum number of entries'
    heading_level:
      title: Heading level
      type: integer
      default: 2
      description: 'Heading level for the legend (1-6)'
    size:
      title: Size
      type: string
      description: 'Visual size of the legend'
    hint:
      title: Hint
      type: string
      description: 'Help text shown below the legend'
    error:
      title: Error
      type: string
      description: 'Error message'
    required:
      title: Required
      type: boolean
      default: false
      description: 'Whether at least one entry is required'
    disabled:
      title: Disabled
      type: boolean
      default: false
      description: 'Whether the repeater is disabled'
    form_steps_sensitive:
      title: Form steps sensitive
      type: boolean
      default: false
      description: 'Mark form-steps mode as sensitive'
    form_steps_show_pause:
      title: Form steps show pause
      type: boolean
      default: false
      description: 'Show pause button in form-steps mode'

slots:
  default:
    title: Default
    description: 'Template for each repeated entry'

libraryOverrides:
  dependencies:
    - civui/civui

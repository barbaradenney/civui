$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Marriage History
status: stable
group: CivUI Compound
description: 'Compound marriage history field with spouse name, dates, and marriage type.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name prefix'
    show_marriage_type:
      title: Show marriage type
      type: boolean
      default: false
      description: 'Show marriage type selector'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false

libraryOverrides:
  dependencies:
    - civui/civui

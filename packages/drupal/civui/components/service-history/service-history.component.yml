$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Service History
status: stable
group: CivUI Compound
description: 'Compound military service history field with branch, dates, and discharge type.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name prefix'
    show_service_number:
      title: Show service number
      type: boolean
      default: false
      description: 'Show service number field'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    branch_error:
      title: Branch error
      type: string
      description: 'Per-field error for the branch-of-service selector'
    start_date_error:
      title: Start date error
      type: string
      description: 'Per-field error for the service-start date input'
    end_date_error:
      title: End date error
      type: string
      description: 'Per-field error for the service-end date input'
    discharge_error:
      title: Discharge error
      type: string
      description: 'Per-field error for the discharge-type selector'
    service_number_error:
      title: Service number error
      type: string
      description: 'Per-field error for the service-number input (only shown when showServiceNumber is true)'


libraryOverrides:
  dependencies:
    - civui/civui

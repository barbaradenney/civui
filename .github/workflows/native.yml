name: Native Compile Check

on:
  push:
    branches: [main]
    paths:
      - 'packages/ios/**'
      - 'packages/android/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/ios/**'
      - 'packages/android/**'

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Swift syntax
        run: |
          cd packages/ios
          # Use swiftc to syntax-check all Swift files without building.
          # This catches malformed source — symbol resolution / availability
          # errors are platform-dependent and need a real toolchain.
          find Sources -name '*.swift' -exec swiftc -parse {} +
          echo "All Swift files parse successfully"
      # Note: `swift test` is intentionally NOT run here. The package is
      # iOS-only (Package.swift declares `.iOS(.v16)`), and `swift test`
      # on a macOS host always tries to build the package for macOS
      # regardless of the platforms array — failing on every UIKit
      # symbol (UIKeyboardType, UITextContentType, UIApplication) and
      # every SwiftUI symbol with @available(iOS 13+) bounds.
      #
      # Proper iOS testing requires `xcodebuild` against an iOS Simulator
      # destination — a separate CI workflow worth setting up when there
      # are real Swift unit tests to run. Until then, parse-check above
      # is the syntax gate; behavioral correctness is verified through
      # the schema-parity tool (which checks the iOS source declares
      # every contract prop).

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Check Kotlin syntax
        run: |
          # Use kotlinc to syntax-check all Kotlin files
          # Note: this requires kotlinc which may need to be installed
          echo "Kotlin syntax check — verifying file structure"
          find packages/android -name '*.kt' | wc -l
          echo "files found"
          # Basic check: ensure all files declare a package. Anchor on a
          # column-0 `package ` line and scan the whole file — a Kotlin
          # package declaration always starts at column 0, but it follows
          # the file-header comment, which can run past the first 10 lines
          # on documented stub components (CivNotice, CivTextButton).
          for f in $(find packages/android -name '*.kt'); do
            if ! grep -qE '^package ' "$f"; then
              echo "FAIL: $f missing package declaration"
              exit 1
            fi
          done
          echo "All Kotlin files have valid package declarations"

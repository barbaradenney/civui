$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Checkbox Group
status: stable
group: CivUI Controls
description: 'Group of checkboxes for multi-select. Self-contained — pass `legend`, `hint`, and `error` directly.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Group legend text'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Comma-separated selected values'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    show_select_all:
      title: Show select all
      type: boolean
      default: false
      description: 'Show a select all checkbox'
    preset:
      title: Preset
      type: string
      enum: ['us-state', 'service-branch', 'discharge-type', 'suffix', 'relationship-type', 'marital-status', 'ethnicity', 'gender', 'language', 'housing-status', 'education-level', 'employment-status', 'income-source', 'veteran-status', 'disability-type', 'citizenship-status', 'pay-frequency', 'contact-preference']
      description: 'Preset option set name'
    preset_variant:
      title: Preset layout
      type: string
      description: 'Variant of the preset options'
    tile:
      title: Tile
      type: boolean
      default: true
      description: 'Tile layout with bordered card styling for child checkboxes. Default true — tiles are the standard treatment'
    orientation:
      title: Orientation
      type: string
      enum: ['vertical', 'horizontal']
      default: 'vertical'
      description: 'Layout orientation for child checkboxes'
    layout:
      title: Variant
      type: string
      enum: ['auto', 'card', 'list']
      default: 'auto'
      description: 'Tile rendering layout. auto picks card for ≤4 options and list for 5+. Vertical + tile only'
    max_selections:
      title: Max selections
      type: integer
      description: 'Maximum number of options the user may check. Blocks the over-pick interactively + auto-appends a "Select up to N" hint'
    min_selections:
      title: Min selections
      type: integer
      description: 'Minimum required count. Positive value implicitly marks the group as required and surfaces "Select at least N" on submit'


slots:
  default:
    title: Default
    description: 'Checkbox elements'

libraryOverrides:
  dependencies:
    - civui/civui

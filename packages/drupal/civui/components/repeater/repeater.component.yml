$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Repeater
status: stable
group: CivUI Form Patterns
description: 'Repeatable form section for adding multiple entries of the same fields.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name prefix'
    item_label:
      title: Item label
      type: string
      description: 'Label template for each item'
    mode:
      title: Mode
      type: string
      enum: ['inline', 'form-steps', 'route']
      description: 'Repeater mode variant'
    min:
      title: Min
      type: integer
      description: 'Minimum number of entries'
    max:
      title: Max
      type: integer
      description: 'Maximum number of entries'
    heading_level:
      title: Heading level
      type: integer
      default: 2
      description: 'Heading level for the legend (1-6)'
    size:
      title: Size
      type: string
      description: 'Visual size of the legend'
    hint:
      title: Hint
      type: string
      description: 'Help text shown below the legend'
    error:
      title: Error
      type: string
      description: 'Error message'
    disabled:
      title: Disabled
      type: boolean
      default: false
      description: 'Whether the repeater is disabled'
    form_steps_sensitive:
      title: Form steps sensitive
      type: boolean
      default: false
      description: 'Mark form-steps mode as sensitive'
    form_steps_show_pause:
      title: Form steps show pause
      type: boolean
      default: false
      description: 'Show pause button in form-steps mode'
    rows:
      title: Rows
      type: array
      default: 
      description: 'Host-owned array of row objects. Only used in `mode="route"`. The repeater renders one summary card per entry and never mutates this array'
    add_href:
      title: Add href
      type: string
      description: 'URL the "Add" affordance links to in `mode="route"`. Required when route mode is used'
    edit_href_pattern:
      title: Edit href pattern
      type: string
      description: 'URL template for the "Edit" link on each row in `mode="route"`. Interpolates `{id}` (from `row[idField]`) and `{index}` (zero-based). Example: `/dependents/{id}/edit`'
    id_field:
      title: Id field
      type: string
      default: 'id'
      description: 'Name of the row property that holds the stable identifier interpolated into `{id}` in `editHrefPattern`'
    summary_fields:
      title: Summary fields
      type: string
      description: 'Comma-separated row property names joined into each summary card. Declarative alternative to the JS `rowSummary` function for non-JS hosts'
    summary_template:
      title: Summary template
      type: string
      description: 'Format string with `{prop}` placeholders for the per-row summary line (e.g. `"{firstName} {lastName} ({relationship})"`). Cross-platform; takes precedence over `summary-fields` when set; loses to `rowSummary` function when both are set'
    empty_state_text:
      title: Empty state text
      type: string
      description: 'Hint shown between the header and the Add button when the list has no rows. Leave blank to omit'

slots:
  default:
    title: Default
    description: 'Template for each repeated entry'

libraryOverrides:
  dependencies:
    - civui/civui

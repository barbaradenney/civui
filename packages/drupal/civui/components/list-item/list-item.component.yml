$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: List Item
status: stable
group: CivUI Layout
description: 'Single item within a list, with optional link and description.'

props:
  type: object
  properties:
    href:
      title: Href
      type: string
      description: 'Link URL to make the item clickable'
    current:
      title: Current
      type: boolean
      default: false
      description: 'Mark as the current active item'
    heading:
      title: Heading
      type: string
      description: 'Item heading text'
    description:
      title: Description
      type: string
      description: 'Item description text'
    error:
      title: Error
      type: string
      description: 'Error message for the item'

slots:
  default:
    title: Default
    description: 'Item content'
  start:
    title: Start
    description: 'Content at the start of the item'
  end:
    title: End
    description: 'Content at the end of the item'

libraryOverrides:
  dependencies:
    - civui/civui

<style>
  /* Storybook-specific styles — tokens are imported via preview.ts */

  /* Prevent white flash: set background before tokens load */
  :root {
    color-scheme: light dark;
  }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    color: #1b1b1b;
    background-color: #ffffff;
  }

  /* Dark background via system preference — applied immediately, no token dependency */
  @media (prefers-color-scheme: dark) {
    body {
      background-color: #1b1b1b;
      color: #f0f0f0;
    }
  }

  /* Dark background via Storybook toolbar toggle */
  :root[data-civ-theme="dark"] ~ body,
  :root[data-civ-theme="dark"] body {
    background-color: #1b1b1b;
    color: #f0f0f0;
  }
</style>
<script>
  // Report iframe height to parent via postMessage (enables cross-origin resize in dev)
  (function() {
    var storyId = new URLSearchParams(window.location.search).get('id') || '';
    var lastHeight = 0;

    function reportHeight() {
      var h = Math.max(
        document.body ? document.body.scrollHeight : 0,
        document.documentElement ? document.documentElement.scrollHeight : 0
      );
      // A top-layer <dialog> (civ-modal / drawer / action-sheet via showModal())
      // is out of normal flow and doesn't grow scrollHeight — measure it so the
      // embedding iframe can expand to show it. Capped (1200) to bound the
      // feedback loop with viewport-height panels (an open drawer is as tall as
      // the frame, so sizing to fit it would grow the frame, ad infinitum).
      var dlg = document.querySelector('dialog[open]');
      if (dlg) {
        h = Math.max(h, dlg.scrollHeight + 96);
      }
      h = Math.min(h, 1200);
      if (h !== lastHeight && h > 0) {
        lastHeight = h;
        try {
          window.parent.postMessage({ type: 'civ-story-resize', storyId: storyId, height: h }, '*');
        } catch(e) {}
      }
    }

    // Report on load, resize, and DOM mutations
    window.addEventListener('load', function() {
      reportHeight();
      // Observe body for DOM changes (component rendering)
      if (window.ResizeObserver) {
        new ResizeObserver(reportHeight).observe(document.body);
      } else {
        setInterval(reportHeight, 500);
      }
      // showModal() doesn't change body size, so ResizeObserver won't fire —
      // watch the `open` attribute across the tree to catch modal/drawer
      // open + close.
      if (window.MutationObserver) {
        new MutationObserver(reportHeight).observe(document.documentElement, {
          attributes: true, attributeFilter: ['open'], subtree: true, childList: true
        });
      }
    });

    // Also report after a short delay for late-rendering components
    setTimeout(reportHeight, 300);
    setTimeout(reportHeight, 1000);
  })();
</script>

name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run consistency check
        run: node --experimental-strip-types tools/consistency-check.ts
      - name: Check component registration
        run: node --experimental-strip-types tools/registration-check.ts

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate parity report
        run: node --experimental-strip-types tools/parity-report.ts
      - name: Check parity threshold (informational)
        run: |
          node --experimental-strip-types -e "
            import { readFileSync } from 'fs';
            const html = readFileSync('tools/parity-report.html', 'utf-8');
            const matches = [...html.matchAll(/class=\"component-header\"[^>]*>\s*(\w+)[\s\S]*?(\d+)%/g)];
            let below = 0;
            for (const m of matches) {
              const pct = parseInt(m[2]);
              if (pct < 95) {
                console.warn('WARN: ' + m[1] + ' at ' + pct + '% (target 95%)');
                below++;
              }
            }
            if (below > 0) {
              console.warn('\n' + below + ' component(s) below 95% parity target.');
              console.warn('This check is informational while native implementations catch up to web.');
              console.warn('See the uploaded parity-report artifact for details.');
            } else {
              console.log('All components at 95%+ parity');
            }
            // Aspirational threshold — exit 0 until native implementations are complete.
            // Re-enable enforcement (process.exit(1)) once all stubs are replaced with
            // full implementations matching the web component APIs.
          "
      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: tools/parity-report.html

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Combobox
status: stable
group: CivUI Inputs
description: 'Autocomplete combobox with filterable option list.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Visible label rendered above the control'
    hint:
      title: Hint
      type: string
      description: 'Hint text rendered below the label'
    error:
      title: Error
      type: string
      description: 'Error message text. When present, switches the control to error styling and is announced via role="alert"'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Current value'
    placeholder:
      title: Placeholder
      type: string
      description: 'Placeholder text'
    inputmode:
      title: Inputmode
      type: string
      enum: ['text', 'numeric', 'decimal', 'tel', 'search', 'email', 'url']
      description: 'Mobile keyboard hint passed to the inner input (numeric, decimal, tel, etc.)'
    no_results_text:
      title: No results text
      type: string
      description: 'Text shown when no options match'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    options:
      title: Options
      type: array
      default: 
      description: 'Array of selectable options'
    width:
      title: Width
      type: string
      enum: ['default', '2xs', 'xs', 'sm', 'md', 'lg', 'xl', '2xl']
      default: 'default'
      description: 'Width variant'
    load_debounce:
      title: Load debounce
      type: integer
      default: 300
      description: 'Debounce in ms before invoking loadOptions on input'
    min_query_length:
      title: Min query length
      type: integer
      default: 0
      description: 'Minimum query length before loadOptions is called. 0 means call on first focus'
    loading_text:
      title: Loading text
      type: string
      description: 'Text shown in the dropdown while loadOptions is in flight'
    loading_error_text:
      title: Loading error text
      type: string
      description: 'Text shown when loadOptions rejects'


slots:
  default:
    title: Default
    description: 'Option elements'

libraryOverrides:
  dependencies:
    - civui/civui

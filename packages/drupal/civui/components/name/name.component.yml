$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Name
status: stable
group: CivUI Compound
description: 'Compound name field with first, middle, last, and suffix inputs.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name prefix'
    hide_middle:
      title: Show middle
      type: boolean
      default: false
      description: 'Show middle name field'
    hide_suffix:
      title: Show suffix
      type: boolean
      default: false
      description: 'Show suffix field'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    first_error:
      title: First error
      type: string
      description: 'Per-field error for the first-name input'
    middle_error:
      title: Middle error
      type: string
      description: 'Per-field error for the middle-name input'
    last_error:
      title: Last error
      type: string
      description: 'Per-field error for the last-name input'


libraryOverrides:
  dependencies:
    - civui/civui

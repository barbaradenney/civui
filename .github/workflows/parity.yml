name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run consistency check
        run: node --experimental-strip-types tools/consistency-check.ts
      - name: Check component registration
        run: node --experimental-strip-types tools/registration-check.ts
      - name: Validate Drupal SDCs
        run: node --experimental-strip-types tools/validate-drupal-sdc.ts

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate parity report
        run: node --experimental-strip-types tools/parity-report.ts
      - name: Enforce parity threshold (85%)
        run: |
          node --experimental-strip-types -e "
            import { readFileSync } from 'fs';
            const html = readFileSync('tools/parity-report.html', 'utf-8');
            const matches = [...html.matchAll(/class=\"component-header\"[^>]*>\s*(\w+)[\s\S]*?(\d+)%/g)];
            let below = 0;
            for (const m of matches) {
              const pct = parseInt(m[2]);
              if (pct < 85) {
                console.warn('FAIL: ' + m[1] + ' at ' + pct + '% (minimum 85%)');
                below++;
              }
            }
            if (below > 0) {
              console.warn('\n' + below + ' component(s) below 85% parity threshold.');
              console.warn('See the uploaded parity-report artifact for details.');
            } else {
              console.log('All components at 85%+ parity');
            }
            if (below > 0) process.exit(1);
          "
      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: tools/parity-report.html

  schema-parity:
    name: Schema parity (Lit ↔ @civui/schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate covered components match their schemas
        run: pnpm parity:schema

  schema-parity-platforms:
    name: Cross-platform schema parity (Lit ↔ iOS ↔ Android ↔ Drupal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate every platform implements every schema prop
        run: pnpm parity:schema --platforms

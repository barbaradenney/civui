$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Count
status: stable
group: CivUI Layout
description: 'Numeric count display with label and variant styling.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Count label text'
    count:
      title: Count
      type: integer
      description: 'Numeric count value'
    max:
      title: Max
      type: integer
      description: 'Maximum count before showing max+'
    variant:
      title: Variant
      type: string
      description: 'Color variant'
    count_style:
      title: Count style
      type: string
      enum: ['primary', 'secondary', 'tertiary']
      default: 'secondary'
      description: 'Visual treatment. `primary` = solid fill; `secondary` (default) = subtle background; `tertiary` = outlined'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Padding density. `default` for standalone; `sm` for inline / overlay contexts'
    overlay:
      title: Overlay
      type: boolean
      default: false
      description: 'Position as overlay over a parent (notification-count style)'
    live:
      title: Live
      type: string
      enum: ['off', 'polite', 'assertive']
      default: 'off'
      description: 'aria-live politeness for dynamic count changes. `off` (default) skips announcements; `polite` announces on idle; `assertive` interrupts'


libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Time Picker
status: stable
group: CivUI Inputs
description: 'Self-contained time-of-day input. Three modes: `combo` (default, USWDS-style typeable combobox), `select` (hour + minute dropdowns + AM/PM segmented control), `text` (masked text input + AM/PM segmented control for arbitrary precision). Stores its value in 24-hour ISO format (HH:MM).'

props:
  type: object
  properties:
    mode:
      title: Mode
      type: string
      description: 'Input mode: "combo" (default), "select", or "text"'
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend (select mode) or label fallback (combo mode)'
    name:
      title: Name
      type: string
      description: 'Base form field name'
    value:
      title: Value
      type: string
      description: 'Time value in 24-hour ISO format (HH:MM)'
    hint:
      title: Hint
      type: string
      description: 'Hint text below the legend'
    error:
      title: Error
      type: string
      description: 'Error message'
    format:
      title: Format
      type: string
      description: 'Display format ("12" or "24")'
    minute_step:
      title: Minute step
      type: integer
      default: 0
      description: 'Increment for the minute slots (default 15 in combo, 5 in select)'
    min:
      title: Min time
      type: string
      description: 'Earliest allowed time (24-hour HH:MM, combo mode only)'
    max:
      title: Max time
      type: string
      description: 'Latest allowed time (24-hour HH:MM, combo mode only)'
    placeholder:
      title: Placeholder
      type: string
      description: 'Placeholder for the combo-mode input'
    hour_label:
      title: Hour label
      type: string
      description: 'Custom label for the hour select (select mode)'
    minute_label:
      title: Minute label
      type: string
      description: 'Custom label for the minute select (select mode)'
    period_label:
      title: Period label
      type: string
      description: 'Custom label for the AM/PM select (select mode)'
    hide_now_button:
      title: Hide Now button
      type: boolean
      default: false
      description: 'Hide the "Now" quick-button (shown by default)'
    now_button_label:
      title: Now button label
      type: string
      description: 'Override the "Now" button label'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false

libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Textarea
status: stable
group: CivUI Inputs
description: 'Multi-line text input. Wrap in form-field for label/hint/error.'

props:
  type: object
  properties:
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Current value'
    rows:
      title: Rows
      type: integer
      default: 4
      description: 'Number of visible text rows'
    maxlength:
      title: Max length
      type: integer
      description: 'Maximum character count'
    placeholder:
      title: Placeholder
      type: string
      description: 'Placeholder text'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    readonly:
      title: Read only
      type: boolean
      default: false

libraryOverrides:
  dependencies:
    - civui/civui

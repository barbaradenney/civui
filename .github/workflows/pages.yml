name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build design tokens (needed by Storybook)
      - run: node packages/tokens/build/build-tokens.js

      # Build web components Storybook
      - run: pnpm storybook:build -o storybook-static

      # Build React Native web Storybook
      - run: pnpm --filter @civds/react-native storybook:web:build

      # Assemble site: docs + /storybook/ + /react-native/
      - run: |
          mkdir -p _site
          cp docs/index.html _site/
          mv storybook-static _site/storybook
          mv packages/react-native/storybook-static _site/react-native

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4

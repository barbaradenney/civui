$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Number
status: stable
group: CivUI Inputs
description: 'Generic numeric input for quantities, counts, ages, and other non-currency numbers. Self-contained — does not need form-field wrapper.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Input label text'
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Current value as a string'
    hint:
      title: Hint
      type: string
      description: 'Hint text below the label'
    error:
      title: Error
      type: string
      description: 'Error message'
    min:
      title: Min
      type: integer
      description: 'Minimum allowed value'
    max:
      title: Max
      type: integer
      description: 'Maximum allowed value'
    allow_decimal:
      title: Allow decimal
      type: boolean
      default: false
      description: 'Allow decimal digits'
    allow_negative:
      title: Allow negative
      type: boolean
      default: false
      description: 'Allow a leading minus sign'
    placeholder:
      title: Placeholder
      type: string
      description: 'Placeholder text'
    prefix:
      title: Prefix
      type: string
      description: 'Prefix text rendered before the input'
    suffix:
      title: Suffix
      type: string
      description: 'Suffix text rendered after the input'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Density variant. `default` renders the full label / hint / error chrome and prefix/suffix decoration. `sm` (compact) renders just the bare `<input>` with the host''s `aria-label` propagated; prefix/suffix decoration is dropped. For dense ...'
    step:
      title: Step
      type: integer
      default: 1
      description: 'Increment / decrement applied on ArrowUp / ArrowDown. Matches native `<input type="number">` keyboard behavior. Set to 0 to disable arrow-key stepping. Fractional steps (0.5, 0.25) require `allow-decimal`.'

libraryOverrides:
  dependencies:
    - civui/civui

name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run consistency check
        run: node --experimental-strip-types tools/consistency-check.ts
      - name: Check component registration
        run: node --experimental-strip-types tools/registration-check.ts
      - name: Validate Drupal SDCs
        run: node --experimental-strip-types tools/validate-drupal-sdc.ts

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate parity report
        run: node --experimental-strip-types tools/parity-report.ts
      - name: Enforce parity threshold (85%)
        run: |
          node --experimental-strip-types -e "
            import { readFileSync } from 'fs';
            const html = readFileSync('tools/parity-report.html', 'utf-8');
            const matches = [...html.matchAll(/class=\"component-header\"[^>]*>\s*(\w+)[\s\S]*?(\d+)%/g)];
            let below = 0;
            for (const m of matches) {
              const pct = parseInt(m[2]);
              if (pct < 85) {
                console.warn('FAIL: ' + m[1] + ' at ' + pct + '% (minimum 85%)');
                below++;
              }
            }
            if (below > 0) {
              console.warn('\n' + below + ' component(s) below 85% parity threshold.');
              console.warn('See the uploaded parity-report artifact for details.');
            } else {
              console.log('All components at 85%+ parity');
            }
            if (below > 0) process.exit(1);
          "
      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: tools/parity-report.html

  schema-parity:
    name: Schema parity (Lit ↔ schema ↔ iOS ↔ Android ↔ Drupal)
    runs-on: ubuntu-latest
    # `--platforms` runs the Lit↔schema check first (always) and adds
    # cross-platform validation on top — one job covers both.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate every platform implements every schema prop
        run: pnpm parity:schema --platforms

  schema-validate:
    name: Schema structural validation (validateAll)
    runs-on: ubuntu-latest
    # Catches structural typos that TypeScript misses: invalid category /
    # extends / valueMode / requiredIndicator values, enum defaults outside
    # the values array, malformed renderOrder. Errors fail the build;
    # binding-reference warnings are informational.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run validateAll over every schema
        run: pnpm validate:schemas

  fieldset-wrappers:
    name: Self-contained group components (no external civ-form-fieldset)
    runs-on: ubuntu-latest
    # Six group components (memorable-date, radio-group, checkbox-group,
    # yes-no, segmented-control, date-range-picker) render their own
    # legend / hint / error from a `legend` prop. Wrapping them in
    # civ-form-fieldset produces nested fieldsets with double legends
    # and breaks slot relocation. This audit-only check fails the build
    # if any consumer / doc / generator code reintroduces the legacy
    # wrapping pattern.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit for external civ-form-fieldset wrapping self-contained group components
        run: pnpm lint:fieldsets

  tool-tests:
    name: Tooling unit tests (parity / sync helpers)
    runs-on: ubuntu-latest
    # Catches regressions in the prop-name normalization, snake↔camel
    # conversions, and Twig rendering helpers that all the parity / sync
    # CI gates rely on. Without this, a broken parser could silently
    # report drift as in-sync.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tool unit tests
        run: pnpm test:tools

  docs-build:
    name: Docusaurus build (catches contract-page generation drift)
    runs-on: ubuntu-latest
    # Catches schema changes that break the contract generator OR produce
    # invalid MDX in any docs page before they reach main. The pages.yml
    # workflow runs the full build on push to main, but this PR-time gate
    # surfaces the same failure before merge instead of after.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Docusaurus (regenerates contract pages via prebuild hook)
        run: cd apps/docs && pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  drupal-sync-clean:
    name: Drupal SDC + Twig in sync with schema
    runs-on: ubuntu-latest
    # Catches hand-edits to *.component.yml or *.twig that diverge from
    # what `pnpm sync:drupal` would emit — e.g. a boolean prop rendered
    # as a string in Twig, a missing slot block, or a stale prop after
    # a schema rename. Schema-parity catches missing props; this catches
    # rendering drift.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Regenerate from schema
        run: pnpm sync:drupal
      - name: Verify the regenerated output matches what's committed
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "::error::Drupal SDC YAML or Twig templates drift from schema."
            echo "::error::Run \`pnpm sync:drupal\` locally and commit the result."
            exit 1
          fi

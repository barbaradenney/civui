name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build all packages (tokens → core → forms)
      - run: pnpm build

      # Build web components Storybook (base path matches deploy subdir)
      - run: pnpm storybook:build -o storybook-static
        env:
          STORYBOOK_BASE: /civui/storybook/

      # Assemble site: docs + /storybook/
      - run: |
          mkdir -p _site
          cp docs/index.html _site/
          mv storybook-static _site/storybook

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4

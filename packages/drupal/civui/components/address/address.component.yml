$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Address
status: stable
group: CivUI Compound
description: 'Compound address field with street, city, state, and zip inputs.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name prefix'
    value:
      title: Value
      type: string
      description: 'JSON-encoded address value'
    show_street2:
      title: Show street 2
      type: boolean
      default: false
      description: 'Show second street address line'
    show_country:
      title: Show country
      type: boolean
      default: false
      description: 'Show country selector'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    variant:
      title: Variant
      type: string
      enum: ['default', 'general-delivery', 'contact']
      default: 'default'
      description: 'Layout variant. default = standard postal mail address; general-delivery = relaxed structure for unhoused / general-delivery addresses; contact = single-line contact-card layout'
    show_street3:
      title: Show street 3
      type: boolean
      default: false
      description: 'Render the optional third address line'
    street_error:
      title: Street error
      type: string
      description: 'Per-field error for the street line, surfaced via the inner civ-text-input'
    city_error:
      title: City error
      type: string
      description: 'Per-field error for the city input'
    state_error:
      title: State error
      type: string
      description: 'Per-field error for the state select'
    zip_error:
      title: Zip error
      type: string
      description: 'Per-field error for the ZIP input'


libraryOverrides:
  dependencies:
    - civui/civui

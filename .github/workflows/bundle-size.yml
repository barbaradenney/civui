name: Bundle Size

on:
  pull_request:
    branches: [main]

jobs:
  check-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build only the publishable packages — not the docs app. The bundle
      # budget measures shipped package dist/, so building apps/docs here is
      # wasted work and would couple this gate to an unrelated build. The
      # docs app has its own build job in parity.yml. `turbo build` doesn't
      # run the root `postbuild` minify hook, so invoke minify explicitly —
      # the budgets below measure the *minified, gzipped* JS output.
      - run: pnpm exec turbo build --filter='./packages/*'

      - run: node scripts/minify.js

      - name: Check bundle sizes
        run: |
          # Per-package budgets in KB of GZIPPED JavaScript — the size a
          # browser actually downloads over the wire, not raw bytes on disk.
          # Calibrated to the current gzipped size + headroom so legitimate
          # growth doesn't flap CI, while a real regression trips the gate.
          # When a bump is intentional, raise the number here in the same PR.
          declare -A BUDGET_GZIP_KB=(
            [actions]=12
            [cli]=16
            [compound]=20
            [content]=4
            [core]=40
            [data]=24
            [feedback]=12
            [form-patterns]=28
            [inputs]=56
            [layout]=16
            [mcp-server]=256
            [navigation]=10
            [overlays]=10
            [schema]=96
            [storybook-utils]=4
            [test-utils]=4
            [tokens]=8
          )

          # Gzipped size (KB, rounded up) of all .js in a dist/ dir.
          gzip_kb() {
            local bytes
            bytes=$(find "$1" -name '*.js' -exec cat {} + 2>/dev/null | gzip -c | wc -c)
            echo $(( (bytes + 1023) / 1024 ))
          }

          echo "## Bundle Sizes (gzipped JS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Gzipped JS | Budget | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------:|-------:|--------|" >> $GITHUB_STEP_SUMMARY

          over_budget=0

          # Iterate every built package so coverage stays complete as packages
          # are added or removed — no hard-coded package list to drift.
          for dist in packages/*/dist; do
            pkg=$(basename "$(dirname "$dist")")

            # Skip private packages — they're not shipped to consumers.
            if grep -q '"private": true' "packages/$pkg/package.json"; then
              continue
            fi

            size_kb=$(gzip_kb "$dist")
            budget=${BUDGET_GZIP_KB[$pkg]:-}

            if [ -z "$budget" ]; then
              # A built, publishable package with no budget entry — fail loudly
              # so new packages get an explicit budget instead of slipping the gate.
              echo "| @civui/$pkg | ${size_kb} K | _(none)_ | ⚠️ unbudgeted |" >> $GITHUB_STEP_SUMMARY
              echo "::error::@civui/$pkg has no bundle budget. Add a BUDGET_GZIP_KB entry in .github/workflows/bundle-size.yml."
              over_budget=1
            elif [ "$size_kb" -gt "$budget" ]; then
              echo "| @civui/$pkg | ${size_kb} K | ${budget} K | ❌ over |" >> $GITHUB_STEP_SUMMARY
              echo "::error::@civui/$pkg gzipped JS is ${size_kb}K (budget: ${budget}K)."
              over_budget=1
            else
              echo "| @civui/$pkg | ${size_kb} K | ${budget} K | ✅ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$over_budget" -ne 0 ]; then
            echo "One or more packages exceeded their gzipped-JS budget." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

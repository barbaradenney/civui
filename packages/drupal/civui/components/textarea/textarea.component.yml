$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Textarea
status: stable
group: CivUI Inputs
description: 'Multi-line text input. Wrap in form-field for label/hint/error.'

props:
  type: object
  properties:
    name:
      title: Name
      type: string
      description: 'Form field name'
    value:
      title: Value
      type: string
      description: 'Current value'
    rows:
      title: Rows
      type: integer
      default: 4
      description: 'Number of visible text rows'
    maxlength:
      title: Max length
      type: integer
      description: 'Maximum character count'
    placeholder:
      title: Placeholder
      type: string
      description: 'Placeholder text'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    readonly:
      title: Read only
      type: boolean
      default: false
    minlength:
      title: Minlength
      type: integer
      description: 'Minimum character length'
    maxwords:
      title: Maxwords
      type: integer
      description: 'Maximum word count. Switches the counter from characters to words and surfaces a "{n} words remaining" hint'
    autogrow:
      title: Autogrow
      type: boolean
      default: false
      description: 'Auto-expand the textarea height to fit the content as the user types'
    max_height:
      title: Max height
      type: string
      description: 'Cap on autogrow height (any CSS length, e.g. "20rem"). Empty string = unlimited'
    validate:
      title: Validate
      type: string
      enum: ['length']
      description: 'Declarative validation preset. length checks min/max boundaries on blur'


libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Card
status: stable
group: CivUI Layout
description: 'Content card container with heading and optional footer.'

props:
  type: object
  properties:
    heading:
      title: Heading
      type: string
      description: 'Card heading text'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      description: 'Internal spacing variant'
    color:
      title: Color
      type: string
      enum: ['blue', 'teal', 'red', 'green', 'yellow', 'orange', 'purple', 'gray']
      description: 'Card color variant'
    card_style:
      title: Card style
      type: string
      enum: ['primary', 'secondary', 'tertiary']
      description: 'Visual style of the card'
    icon_start:
      title: Icon start
      type: string
      description: 'Leading icon name (rendered before slotted content)'
    icon_end:
      title: Icon end
      type: string
      description: 'Trailing icon name'


slots:
  default:
    title: Default
    description: 'Card body content'
  footer:
    title: Footer
    description: 'Card footer content'

libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Badge
status: stable
group: CivUI Layout
description: 'Notification badge with count display and dot intent.'

props:
  type: object
  properties:
    label:
      title: Label
      type: string
      description: 'Accessible label for the badge'
    count:
      title: Count
      type: integer
      description: 'Numeric count to display'
    max:
      title: Max
      type: integer
      description: 'Maximum count before showing max+'
    dot:
      title: Dot
      type: boolean
      default: false
      description: 'Show as dot indicator instead of count'
    intent:
      title: Variant
      type: string
      enum: ['info', 'success', 'warning', 'error', 'neutral']
      description: 'Color intent'
    emphasis:
      title: Emphasis
      type: string
      enum: ['primary', 'secondary']
      description: 'Visual style of the badge'
    with_icon:
      title: With icon
      type: boolean
      default: false
      description: 'Include an icon in the badge'
    spacing:
      title: Spacing
      type: string
      enum: ['default', 'sm']
      default: 'default'
      description: 'Padding density. `default` for standalone badges; `sm` for inline / table contexts'
    overlay:
      title: Overlay
      type: boolean
      default: false
      description: 'Position the badge as an overlay over a parent element (notification-count style)'
    icon_start:
      title: Icon start
      type: string
      description: 'Override the leading icon name. Takes precedence over with-icon when both are set'
    icon_end:
      title: Icon end
      type: string
      description: 'Trailing icon name (e.g. dismiss / chevron)'


libraryOverrides:
  dependencies:
    - civui/civui

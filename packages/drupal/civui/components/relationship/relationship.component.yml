$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Relationship
status: stable
group: CivUI Compound
description: 'Compound relationship field with type, name, and deceased status.'

props:
  type: object
  properties:
    legend:
      title: Legend
      type: string
      description: 'Fieldset legend text'
    name:
      title: Name
      type: string
      description: 'Form field name prefix'
    preset:
      title: Preset
      type: string
      description: 'Relationship type preset'
    show_name:
      title: Show name
      type: boolean
      default: false
      description: 'Show related person name fields'
    show_deceased:
      title: Show deceased
      type: boolean
      default: false
      description: 'Show deceased status field'
    required:
      title: Required
      type: boolean
      default: false
    disabled:
      title: Disabled
      type: boolean
      default: false
    options:
      title: Options
      type: array
      description: 'Custom relationship-type configuration. When set, overrides the preset. Each entry: {value, label, fields?: ("marriage-date"|"divorce-date"|"date-of-birth"|"adoption-date"|"date-of-death")[]}'
    deceased_assumed:
      title: Deceased assumed
      type: boolean
      default: false
      description: 'Suppress the deceased toggle and treat all entries as deceased — used for survivor-only contexts'
    show_divorce_date:
      title: Show divorce date
      type: boolean
      default: false
      description: 'Render the divorce-date input when the relationship type is spouse-related'
    show_adoption_date:
      title: Show adoption date
      type: boolean
      default: false
      description: 'Render the adoption-date input when the relationship type is child-related'
    name_error:
      title: Name error
      type: string
      description: 'Per-field error for the relative-name input'
    relationship_error:
      title: Relationship error
      type: string
      description: 'Per-field error for the relationship-type selector'
    marriage_date_error:
      title: Marriage date error
      type: string
      description: 'Per-field error for the marriage-date input'
    divorce_date_error:
      title: Divorce date error
      type: string
      description: 'Per-field error for the divorce-date input'
    date_of_birth_error:
      title: Date of birth error
      type: string
      description: 'Per-field error for the date-of-birth input'
    adoption_date_error:
      title: Adoption date error
      type: string
      description: 'Per-field error for the adoption-date input'
    date_of_death_error:
      title: Date of death error
      type: string
      description: 'Per-field error for the date-of-death input'
    other_description_error:
      title: Other description error
      type: string
      description: 'Per-field error for the "describe the relationship" free-text input (shown when relationship = other)'
    hide_name:
      title: Hide name
      type: boolean
      default: false
      description: 'Inverse of `show-name` — present in HTML disables the inner name fields. Use when an enclosing repeater step already captures the name and you want to avoid duplicating it inside civ-relationship.'
    first_error:
      title: First error
      type: string
      description: 'Per-field error for the first-name input inside the relative-name section'
    middle_error:
      title: Middle error
      type: string
      description: 'Per-field error for the middle-name input inside the relative-name section'
    last_error:
      title: Last error
      type: string
      description: 'Per-field error for the last-name input inside the relative-name section'

libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Filter Chip Group
status: stable
group: CivUI Controls
description: 'Group of filter chips with single or multi-select mode.'

props:
  type: object
  properties:
    mode:
      title: Mode
      type: string
      enum: ['multi', 'single']
      description: 'Selection mode'
    label:
      title: Label
      type: string
      description: 'Accessible group label'
    name:
      title: Name
      type: string
      description: 'Form field name (for form submission / state registration)'

slots:
  default:
    title: Default
    description: 'Filter chip elements'

libraryOverrides:
  dependencies:
    - civui/civui

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Progress Steps
status: stable
group: CivUI Form Patterns
description: 'Step indicator for multi-step form progress.'

props:
  type: object
  properties:
    current:
      title: Current
      type: integer
      description: 'Current step index (zero-based)'
    legend:
      title: Legend
      type: string
      description: 'Accessible legend for the step list'
    clickable:
      title: Clickable
      type: boolean
      default: false
      description: 'Allow clicking on completed steps to navigate'
    show_counter:
      title: Show counter
      type: boolean
      default: false
      description: 'Show step counter text'

libraryOverrides:
  dependencies:
    - civui/civui

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivUI Platform Comparison</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1b1b1b; }

  .header {
    background: #1b1b1b; color: white; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header select { padding: 6px 10px; border-radius: 4px; border: 1px solid #565c65; background: #3d4551; color: white; font-size: 14px; }

  .main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .component-section { margin-bottom: 32px; }
  .component-section h2 {
    font-size: 16px; font-weight: 600; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid #dfe1e2;
  }

  .platform-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
  }

  .platform-card {
    background: white; border: 1px solid #dfe1e2; border-radius: 8px; overflow: hidden;
  }
  .platform-card-header {
    padding: 8px 12px; font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px;
  }
  .platform-card-header.web { background: #d9e8f6; color: #1a4480; }
  .platform-card-header.ios { background: #1b1b1b; color: white; }
  .platform-card-header.android { background: #ecf3ec; color: #4d8055; }

  .platform-card-body {
    padding: 16px; min-height: 200px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .screenshot-drop {
    width: 100%; min-height: 160px; border: 2px dashed #dfe1e2; border-radius: 6px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    position: relative; overflow: hidden;
  }
  .screenshot-drop:hover { border-color: #005ea2; background: #f0f6ff; }
  .screenshot-drop.has-image { border: none; padding: 0; }
  .screenshot-drop img {
    max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 4px;
  }
  .screenshot-drop .placeholder-icon { font-size: 32px; color: #a9aeb1; }
  .screenshot-drop .placeholder-text { font-size: 13px; color: #71767a; text-align: center; }
  .screenshot-drop input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .screenshot-drop .remove-btn {
    position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white;
    border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer;
    font-size: 14px; display: none; align-items: center; justify-content: center;
  }
  .screenshot-drop.has-image .remove-btn { display: flex; }
  .screenshot-drop.has-image .placeholder-icon,
  .screenshot-drop.has-image .placeholder-text,
  .screenshot-drop.has-image input[type="file"] { display: none; }

  .code-toggle {
    margin-top: 8px; width: 100%; text-align: left;
    background: none; border: none; color: #005ea2; cursor: pointer;
    font-size: 12px; padding: 4px 0; text-decoration: underline;
  }
  .code-block {
    display: none; margin-top: 8px; background: #1b1b1b; color: #e0e0e0;
    padding: 10px; border-radius: 4px; font-size: 11px; line-height: 1.4;
    overflow-x: auto; white-space: pre; font-family: 'SF Mono', 'Roboto Mono', monospace;
  }
  .code-block.open { display: block; }

  .status-bar {
    display: flex; gap: 12px; align-items: center; margin-bottom: 16px;
    padding: 8px 12px; background: white; border: 1px solid #dfe1e2; border-radius: 6px;
    font-size: 13px;
  }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; }
  .status-dot.complete { background: #00a91c; }
  .status-dot.partial { background: #e5a000; }
  .status-dot.missing { background: #b50909; }

  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 4px 12px; border: 1px solid #dfe1e2; border-radius: 16px;
    background: white; cursor: pointer; font-size: 12px; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #005ea2; }
  .filter-btn.active { background: #005ea2; color: white; border-color: #005ea2; }

  .notes {
    margin-top: 8px; width: 100%;
  }
  .notes textarea {
    width: 100%; padding: 6px 8px; border: 1px solid #dfe1e2; border-radius: 4px;
    font-size: 12px; font-family: system-ui; resize: vertical; min-height: 40px;
  }

  @media (max-width: 900px) {
    .platform-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>CivUI Platform Comparison</h1>
  <div style="display:flex;gap:12px;align-items:center;">
    <button onclick="exportReport()" style="padding:6px 16px;background:#005ea2;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;">Export Report</button>
    <button onclick="saveState()" style="padding:6px 16px;background:#3d4551;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;">Save Progress</button>
    <button onclick="loadState()" style="padding:6px 16px;background:#3d4551;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;">Load Progress</button>
  </div>
</div>

<div class="main">
  <div class="status-bar">
    <span><span class="status-dot complete"></span> Screenshots added</span>
    <span><span class="status-dot partial"></span> Partial</span>
    <span><span class="status-dot missing"></span> Missing</span>
    <span style="margin-left:auto;" id="progress-text">0 / 0 screenshots</span>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="filterComponents('all')">All</button>
    <button class="filter-btn" onclick="filterComponents('navigation')">Navigation</button>
    <button class="filter-btn" onclick="filterComponents('form')">Form</button>
    <button class="filter-btn" onclick="filterComponents('feedback')">Feedback</button>
    <button class="filter-btn" onclick="filterComponents('layout')">Layout</button>
  </div>

  <div id="components"></div>
</div>

<script>
const components = [
  { name: 'TextInput', category: 'form', variants: ['Default', 'With Mask (SSN)', 'Currency', 'Readonly', 'Error', 'Disabled'] },
  { name: 'Textarea', category: 'form', variants: ['Default', 'Character Count', 'Word Count', 'Error'] },
  { name: 'Select', category: 'form', variants: ['Default', 'With Hint', 'Error', 'Disabled'] },
  { name: 'Combobox', category: 'form', variants: ['Default', 'Filtered', 'No Results', 'Error'] },
  { name: 'Checkbox', category: 'form', variants: ['Default', 'Checked', 'Tile', 'Indeterminate', 'Disabled'] },
  { name: 'CheckboxGroup', category: 'form', variants: ['Default', 'Tile Variant', 'Error', 'Horizontal'] },
  { name: 'Radio', category: 'form', variants: ['Default', 'Tile Variant', 'Error'] },
  { name: 'Toggle', category: 'form', variants: ['Default', 'Checked', 'With Description', 'Disabled'] },
  { name: 'DatePicker', category: 'form', variants: ['Default', 'Calendar Open', 'With Constraints'] },
  { name: 'MemorableDate', category: 'form', variants: ['Default', 'Prefilled', 'Error'] },
  { name: 'FileUpload', category: 'form', variants: ['Default', 'With Files', 'Error'] },
  { name: 'SegmentedControl', category: 'form', variants: ['Default', 'Selected'] },
  { name: 'Fieldset', category: 'layout', variants: ['Default', 'With Error', 'Disabled'] },
  { name: 'Form', category: 'layout', variants: ['Default', 'Error Summary'] },
  { name: 'FormGroup', category: 'layout', variants: ['Default', 'With Error'] },
  { name: 'Icon', category: 'navigation', variants: ['All Icons'] },
  { name: 'Alert', category: 'feedback', variants: ['Info', 'Warning', 'Error', 'Success'] },
];

const platforms = ['web', 'ios', 'android'];
const platformLabels = { web: 'Web (Lit)', ios: 'iOS (SwiftUI)', android: 'Android (Compose)' };
const screenshots = {}; // { 'TextInput-Default-web': dataUrl }
const notes = {}; // { 'TextInput-Default': 'note text' }

function getCodeSnippet(component, platform) {
  const name = component.name;
  if (platform === 'web') {
    return `<civ-${name.replace(/([A-Z])/g, '-$1').toLowerCase().replace(/^-/, '')}\n  label="${name}"\n  name="${name.toLowerCase()}"\n  required\n><\/civ-${name.replace(/([A-Z])/g, '-$1').toLowerCase().replace(/^-/, '')}>`;
  } else if (platform === 'ios') {
    return `Civ${name}(\n    label: "${name}",\n    value: $value,\n    isRequired: true\n)`;
  } else {
    return `Civ${name}(\n    label = "${name}",\n    value = value,\n    onValueChange = { value = it },\n    required = true,\n)`;
  }
}

function renderComponents(filter = 'all') {
  const container = document.getElementById('components');
  container.innerHTML = '';

  const filtered = filter === 'all' ? components : components.filter(c => c.category === filter);

  filtered.forEach(comp => {
    comp.variants.forEach(variant => {
      const section = document.createElement('div');
      section.className = 'component-section';
      section.setAttribute('data-category', comp.category);

      section.innerHTML = `
        <h2>${comp.name} — ${variant}</h2>
        <div class="platform-grid">
          ${platforms.map(p => {
            const key = `${comp.name}-${variant}-${p}`;
            const hasImg = screenshots[key];
            return `
              <div class="platform-card">
                <div class="platform-card-header ${p}">${platformLabels[p]}</div>
                <div class="platform-card-body">
                  <div class="screenshot-drop ${hasImg ? 'has-image' : ''}" id="drop-${key}">
                    ${hasImg ? `<img src="${hasImg}" alt="${comp.name} ${variant} on ${p}">` : ''}
                    <button class="remove-btn" onclick="removeScreenshot('${key}', event)" title="Remove">✕</button>
                    <div class="placeholder-icon">📷</div>
                    <div class="placeholder-text">Drop screenshot or click to upload<br>${platformLabels[p]}</div>
                    <input type="file" accept="image/*" onchange="handleUpload('${key}', event)">
                  </div>
                  <button class="code-toggle" onclick="toggleCode(this)">Show code</button>
                  <div class="code-block">${getCodeSnippet(comp, p)}</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="notes">
          <textarea placeholder="Notes for ${comp.name} ${variant}..." oninput="notes['${comp.name}-${variant}'] = this.value">${notes[`${comp.name}-${variant}`] || ''}</textarea>
        </div>
      `;
      container.appendChild(section);
    });
  });

  updateProgress();
}

function handleUpload(key, event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    screenshots[key] = e.target.result;
    const drop = document.getElementById(`drop-${key}`);
    drop.classList.add('has-image');
    drop.querySelector('img')?.remove();
    const img = document.createElement('img');
    img.src = e.target.result;
    img.alt = key;
    drop.insertBefore(img, drop.firstChild);
    updateProgress();
  };
  reader.readAsDataURL(file);
}

function removeScreenshot(key, event) {
  event.stopPropagation();
  delete screenshots[key];
  const drop = document.getElementById(`drop-${key}`);
  drop.classList.remove('has-image');
  drop.querySelector('img')?.remove();
  updateProgress();
}

function toggleCode(btn) {
  const block = btn.nextElementSibling;
  block.classList.toggle('open');
  btn.textContent = block.classList.contains('open') ? 'Hide code' : 'Show code';
}

function filterComponents(category) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderComponents(category);
}

function updateProgress() {
  const total = components.reduce((sum, c) => sum + c.variants.length * 3, 0);
  const filled = Object.keys(screenshots).length;
  document.getElementById('progress-text').textContent = `${filled} / ${total} screenshots`;
}

function saveState() {
  try {
    const state = { screenshots, notes };
    localStorage.setItem('civui-comparison', JSON.stringify(state));
    alert('Progress saved!');
  } catch (e) {
    alert('Could not save — too much data for localStorage. Try removing some large screenshots.');
  }
}

function loadState() {
  try {
    const saved = localStorage.getItem('civui-comparison');
    if (!saved) { alert('No saved progress found.'); return; }
    const state = JSON.parse(saved);
    Object.assign(screenshots, state.screenshots || {});
    Object.assign(notes, state.notes || {});
    renderComponents();
    alert('Progress loaded!');
  } catch (e) {
    alert('Could not load saved progress.');
  }
}

function exportReport() {
  let md = '# CivUI Platform Comparison Report\n\n';
  md += `Generated: ${new Date().toLocaleDateString()}\n\n`;

  const total = components.reduce((sum, c) => sum + c.variants.length * 3, 0);
  const filled = Object.keys(screenshots).length;
  md += `**Progress:** ${filled} / ${total} screenshots captured\n\n`;

  components.forEach(comp => {
    md += `## ${comp.name}\n\n`;
    comp.variants.forEach(variant => {
      const webKey = `${comp.name}-${variant}-web`;
      const iosKey = `${comp.name}-${variant}-ios`;
      const androidKey = `${comp.name}-${variant}-android`;
      const web = screenshots[webKey] ? '✅' : '❌';
      const ios = screenshots[iosKey] ? '✅' : '❌';
      const android = screenshots[androidKey] ? '✅' : '❌';
      md += `### ${variant}\n`;
      md += `| Web | iOS | Android |\n|-----|-----|--------|\n| ${web} | ${ios} | ${android} |\n\n`;
      const note = notes[`${comp.name}-${variant}`];
      if (note) md += `**Notes:** ${note}\n\n`;
    });
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'civui-platform-comparison.md';
  a.click();
}

// Drag and drop support on the whole page
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const drop = e.target.closest('.screenshot-drop');
  if (!drop) return;
  const key = drop.id.replace('drop-', '');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    screenshots[key] = ev.target.result;
    drop.classList.add('has-image');
    drop.querySelector('img')?.remove();
    const img = document.createElement('img');
    img.src = ev.target.result;
    img.alt = key;
    drop.insertBefore(img, drop.firstChild);
    updateProgress();
  };
  reader.readAsDataURL(file);
});

renderComponents();
</script>
</body>
</html>
